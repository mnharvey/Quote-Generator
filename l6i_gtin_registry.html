<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L6I GTIN Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A1A2E; --red:#B03028; --red-dark:#860000; --gold:#C8A84B;
  --white:#fff; --gray:#666; --mid-gray:#ddd; --light-gray:#f5f5f5; --charcoal:#222;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--light-gray);color:var(--charcoal);}
.topbar{background:var(--navy);color:var(--white);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.topbar-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.topbar-title span{color:var(--gold);}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;}
.nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-left:14px;}
.nav-links a:hover{color:var(--gold);}

.container{max-width:1100px;margin:0 auto;padding:20px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--white);border:1.5px solid var(--mid-gray);border-radius:4px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;}
.stat-card:hover{border-color:var(--red);}
.stat-card.active{border-color:var(--red);background:#fff8f8;}
.stat-num{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--navy);}
.stat-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.stat-card.warn .stat-num{color:#B45309;}
.stat-card.danger .stat-num{color:var(--red);}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:220px;position:relative;}
#search{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--mid-gray);border-radius:4px;font-size:14px;outline:none;}
#search:focus{border-color:var(--red);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:14px;}
select#status-filter{padding:10px 12px;border:1.5px solid var(--mid-gray);border-radius:4px;font-size:13px;background:var(--white);outline:none;}
.issues-toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray);cursor:pointer;padding:8px 12px;border:1.5px solid var(--mid-gray);border-radius:4px;background:var(--white);}
.issues-toggle.active{border-color:#B45309;color:#B45309;background:#fffbeb;}
.export-btn{padding:10px 16px;background:var(--navy);color:var(--white);border:none;border-radius:4px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.export-btn:hover{background:var(--red);}

.results-count{font-size:12px;color:var(--gray);margin-bottom:10px;}

.table-wrap{background:var(--white);border:1.5px solid var(--mid-gray);border-radius:4px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--navy);color:var(--white);font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:10px 12px;text-align:left;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid #eee;vertical-align:top;}
tr:hover td{background:#fafafa;}
tr:last-child td{border-bottom:none;}
.gtin-cell{font-family:monospace;font-size:12px;color:var(--gray);white-space:nowrap;}
.desc-cell{max-width:380px;}
.sku-cell{font-family:monospace;font-size:12px;white-space:nowrap;}
.sku-empty{color:#bbb;font-style:italic;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.status-inuse{background:#e8f5e9;color:#2e7d32;}
.status-archived{background:#f0f0f0;color:#888;}
.status-premarket{background:#fff3e0;color:#e65100;}
.modified-cell{font-size:12px;color:var(--gray);white-space:nowrap;}
.issue-tag{display:inline-block;background:#fef3c7;color:#92400e;font-size:10px;padding:2px 6px;border-radius:3px;margin-top:3px;margin-right:3px;white-space:nowrap;}
.issue-tag.dup{background:#fee2e2;color:#991b1b;}

.empty-state{text-align:center;padding:40px;color:var(--gray);}

@media (max-width:700px){
  .container{padding:12px;}
  table{font-size:12px;}
  th,td{padding:8px 8px;}
  .desc-cell{max-width:200px;}
}
</style>
</head>
<body>

<div class="topbar">

  <div class="nav-links">

      <tbody id="tbody"></tbody>

  </div>

</div>

let showIssuesOnly = false;

function statusClass(s){
  if(s==='IN USE') return 'status-inuse';
  if(s==='ARCHIVED') return 'status-archived';
  if(s==='PREMARKET') return 'status-premarket';
  return '';
}

function renderStats(){
  const total = ITEMS.length;
  const inUse = ITEMS.filter(i=>i.status==='IN USE').length;
  const archived = ITEMS.filter(i=>i.status==='ARCHIVED').length;
  const premarket = ITEMS.filter(i=>i.status==='PREMARKET').length;
  const missingSku = ITEMS.filter(i=>i.issues.some(x=>x.includes('Missing SKU'))).length;
  const dupSku = ITEMS.filter(i=>i.issues.some(x=>x.includes('Duplicate'))).length;
  const otherIssues = ITEMS.filter(i=>i.issues.some(x=>!x.includes('Missing SKU')&&!x.includes('Duplicate'))).length;

  const stats = [
    {label:'Total GTINs', num:total, filter:'all', cls:''},
    {label:'In Use', num:inUse, filter:'IN USE', cls:''},
    {label:'Archived', num:archived, filter:'ARCHIVED', cls:''},
    {label:'Premarket', num:premarket, filter:'PREMARKET', cls:''},
    {label:'Missing SKU', num:missingSku, filter:'issues', cls:'warn'},
    {label:'Duplicate SKU', num:dupSku, filter:'issues', cls:'danger'},
  ];

  document.getElementById('stats-row').innerHTML = stats.map(s=>
    `<div class="stat-card ${s.cls}" onclick="statClick('${s.filter}')">
      <div class="stat-num">${s.num}</div>
      <div class="stat-label">${s.label}</div>
    </div>`
  ).join('');
}

function statClick(filter){
  if(filter==='issues'){
    showIssuesOnly = true;
    document.getElementById('issues-toggle').classList.add('active');
    document.getElementById('status-filter').value = 'all';
  } else {
    showIssuesOnly = false;
    document.getElementById('issues-toggle').classList.remove('active');
    document.getElementById('status-filter').value = filter;
  }
  render();
}

function toggleIssuesOnly(){
  showIssuesOnly = !showIssuesOnly;
  document.getElementById('issues-toggle').classList.toggle('active', showIssuesOnly);
  render();
}

function getFiltered(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;

  return ITEMS.filter(i=>{
    if(statusFilter!=='all' && i.status!==statusFilter) return false;
    if(showIssuesOnly && i.issues.length===0) return false;
    if(q){
      const hay = (i.desc+' '+i.sku+' '+i.gtin).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const filtered = getFiltered();
  document.getElementById('results-count').textContent = filtered.length + ' of ' + ITEMS.length + ' items';

  const tbody = document.getElementById('tbody');
  if(!filtered.length){
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No items match your search/filter.</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(i=>{
    const issuesHtml = i.issues.map(x=>{
      const cls = x.includes('Duplicate') ? 'issue-tag dup' : 'issue-tag';
      return `<span class="${cls}">${esc(x)}</span>`;
    }).join('');
    return `<tr>
      <td class="desc-cell">${esc(i.desc)}${issuesHtml ? '<br>'+issuesHtml : ''}</td>
      <td class="sku-cell">${i.sku ? esc(i.sku) : '<span class="sku-empty">— none —</span>'}</td>
      <td class="gtin-cell">${esc(i.gtin)}</td>
      <td><span class="status-badge ${statusClass(i.status)}">${esc(i.status)}</span></td>
      <td class="modified-cell">${esc(i.modified)}</td>
    </tr>`;
  }).join('');
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportCSV(){
  const filtered = getFiltered();
  const rows = [['GTIN','Status','Description','SKU','Modified','Issues']];
  filtered.forEach(i=>{
    rows.push([i.gtin, i.status, i.desc, i.sku, i.modified, i.issues.join('; ')]);
  });
  const csv = rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'L6I_GTIN_Registry_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('status-filter').addEventListener('change', render);

renderStats();
render();
</script>

</body>
</html>
